name: Automatic WhatsApp reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      APP_URL: https://www.minerval.org
      CRON_SECRET: ${{ secrets.WHATSAPP_REMINDER_CRON_SECRET }}
    steps:
      - name: Verify configuration
        run: test -n "$CRON_SECRET"
      - name: Enqueue and dispatch reminders
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/internal/whatsapp-reminders"
