name: Quality gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, lint, build, and browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_KEY: ci-service-key
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_GROWTH_MONTHLY: price_growth_ci
      STRIPE_PRICE_PRO_MONTHLY: price_pro_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
      RESEND_API_KEY: re_ci
      SERDIPAY_CALLBACK_SECRET: ci-callback-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Reject high-severity dependency vulnerabilities
        run: npm audit --audit-level=high

      - name: Run unit and integration tests
        run: npm test

      - name: Run lint checks
        run: npm run lint

      - name: Build production application
        run: npm run build

      - name: Install browser runtime
        run: npx playwright install --with-deps chromium

      - name: Run public legal and signup browser smoke test
        run: npx playwright test e2e/legal.spec.ts
